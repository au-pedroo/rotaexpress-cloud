name: CI/CD · DEV

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  # JOB 1: validação (roda em todo push e PR → vira check obrigatório)
  validate:
    name: Validar HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar se index.html existe
        run: |
          if [ ! -f index.html ]; then
            echo "ERRO: index.html não encontrado!"
            exit 1
          fi
          echo "✅ index.html encontrado"

      - name: Verificar tamanho mínimo do arquivo
        run: |
          SIZE=$(wc -c < index.html)
          echo "Tamanho do arquivo: $SIZE bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERRO: index.html parece incompleto"
            exit 1
          fi
          echo "✅ Arquivo OK"

  # JOB 2: deploy (só roda em push direto na branch, não em PRs)
  deploy-dev:
    name: Deploy → DEV
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH para EC2 DEV
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEV_KEY }}
          script: |
            cd /home/ec2-user
            # Para o container anterior se existir
            docker stop rotaexpress-dev 2>/dev/null || true
            docker rm   rotaexpress-dev 2>/dev/null || true
            # Copia o HTML novo
            cat > /home/ec2-user/index.html << 'HTMLEOF'
            $(cat index.html)
            HTMLEOF
            # Sobe o container
            docker run -d \
              --name rotaexpress-dev \
              --restart unless-stopped \
              -p 8080:80 \
              -v /home/ec2-user/index.html:/usr/share/nginx/html/index.html:ro \
              nginx:alpine
            echo "✅ DEV no ar: http://${{ secrets.DEV_HOST }}:8080"
name: CI/CD DEV

on:
  push:
    branches:
      - develop

  pull_request:
    branches:
      - develop

jobs:
  validate:
    name: Validar HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar index.html
        run: |
          if [ ! -f index.html ]; then
            echo "index.html não encontrado"
            exit 1
          fi

      - name: Verificar tamanho mínimo
        run: |
          SIZE=$(wc -c < index.html)
          echo "Tamanho: $SIZE bytes"

          if [ "$SIZE" -lt 500 ]; then
            echo "Arquivo parece incompleto"
            exit 1
          fi

  deploy-dev:
    name: Deploy DEV
    runs-on: ubuntu-latest

    needs: validate

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos para EC2 DEV
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEV_KEY }}
          source: "index.html,Dockerfile,nginx.conf"
          target: "/home/ubuntu/rotaexpress"

      - name: Build e Deploy DEV
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.DEV_KEY }}
          script: |
            mkdir -p /home/ubuntu/rotaexpress
            cd /home/ubuntu/rotaexpress

            docker stop rotaexpress-dev || true
            docker rm rotaexpress-dev || true
            docker rmi rotaexpress:dev || true

            docker build -t rotaexpress:dev .

            docker run -d \
              --name rotaexpress-dev \
              --restart unless-stopped \
              -p 8080:80 \
              rotaexpress:dev

            sleep 5

            curl -f http://localhost:8080/health

            echo "Deploy DEV concluído"
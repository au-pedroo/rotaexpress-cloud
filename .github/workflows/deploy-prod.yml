name: CI/CD · PROD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validar HTML (PROD)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar index.html
        run: |
          [ -f index.html ] && echo "✅ OK" || (echo "❌ Faltando" && exit 1)

  deploy-prod:
    name: Deploy → PROD
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH para EC2 PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            docker stop rotaexpress-prod 2>/dev/null || true
            docker rm   rotaexpress-prod 2>/dev/null || true
            cat > /home/ec2-user/index.html << 'EOF'
            $(cat index.html)
            EOF
            docker run -d \
              --name rotaexpress-prod \
              --restart unless-stopped \
              -p 80:80 \
              -v /home/ec2-user/index.html:/usr/share/nginx/html/index.html:ro \
              nginx:alpine
            echo "✅ PROD no ar: http://${{ secrets.PROD_HOST }}"
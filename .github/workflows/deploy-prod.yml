name: CI/CD PROD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validar HTML PROD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar index.html
        run: |
          if [ ! -f index.html ]; then
            echo "index.html não encontrado"
            exit 1
          fi

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest

    needs: validate

    if: github.event_name == 'push'

    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos para EC2 PROD
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.PROD_KEY }}
          source: "index.html,Dockerfile,nginx.conf"
          target: "/home/ubuntu/rotaexpress"

      - name: Build e Deploy PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.PROD_KEY }}
          script: |
            mkdir -p /home/ubuntu/rotaexpress
            cd /home/ubuntu/rotaexpress

            docker stop rotaexpress-prod || true
            docker rm rotaexpress-prod || true
            docker rmi rotaexpress:prod || true

            docker build -t rotaexpress:prod .

            docker run -d \
              --name rotaexpress-prod \
              --restart unless-stopped \
              -p 80:80 \
              rotaexpress:prod

            sleep 5

            curl -f http://localhost/health

            echo "Deploy PROD concluído"
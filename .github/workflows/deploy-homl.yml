name: CI/CD HOML

on:
  push:
    branches:
      - staging

  pull_request:
    branches:
      - staging

jobs:
  validate:
    name: Validar HTML HOML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verificar index.html
        run: |
          if [ ! -f index.html ]; then
            echo "index.html não encontrado"
            exit 1
          fi

  deploy-homl:
    name: Deploy HOML
    runs-on: ubuntu-latest

    needs: validate

    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos para EC2 HOML
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOML_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.HOMOL_KEY }}
          source: "index.html,Dockerfile,nginx.conf"
          target: "/home/ubuntu/rotaexpress"

      - name: Build e Deploy HOML
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOML_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.HOMOL_KEY }}
          script: |
            mkdir -p /home/ubuntu/rotaexpress
            cd /home/ubuntu/rotaexpress

            docker stop rotaexpress-homl || true
            docker rm rotaexpress-homl || true
            docker rmi rotaexpress:homl || true

            docker build -t rotaexpress:homl .

            docker run -d \
              --name rotaexpress-homl \
              --restart unless-stopped \
              -p 8080:80 \
              rotaexpress:homl

            sleep 5

            curl -f http://localhost:8080/health

            echo "Deploy HOML concluído"